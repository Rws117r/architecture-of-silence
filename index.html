<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture of Silence | Archival Study</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Shell Overrides */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: var(--background);
            font-family: 'PP Fraktion', sans-serif;
        }

        #content-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            z-index: 1;
            transition: opacity 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            opacity: 1;
        }

        #content-frame.fading {
            opacity: 0;
        }

        #audio-player-mount {
            z-index: 2000;
        }
        
        #main-nav {
            z-index: 3000;
        }
    </style>
</head>
<body>

    <nav id="main-nav" class="vellum-nav"></nav>
    <iframe id="content-frame" src="home.html"></iframe>

    <div id="audio-player-mount"></div>

    <script src="components.js"></script>
</body>
</html>
